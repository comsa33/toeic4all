<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모두의 토익</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/board.css') }}">
    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <nav>
        <h2><a href="{{ url_for('main.main_page') }}">모두의 토익</a></h2>
        <ul>
            <li class="{{ 'active' if request.endpoint.endswith('mock_test') }}"><a href="{{ url_for('main.mock_test') }}">모의고사</a></li>
            <li class="{{ 'active' if request.endpoint.endswith('board_page') }}"><a href="{{ url_for('main.board_page') }}">Q&A 게시판</a></li>
            {% if 'user_id' in session %}
                <li><a href="#" id="logout">Logout</a></li>
            {% else %}
                <li><a href="https://toeic4all.com/user/login">Login</a></li>
                <li><a href="https://toeic4all.com/user/signup">Sign Up</a></li>
            {% endif %}
        </ul>              
    </nav>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/board.js') }}"></script>
</body>
</html>
