<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.7/dist/web/variable/pretendardvariable-dynamic-subset.css" />
    <title>лӘЁл‘җмқҳ нҶ мқө</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/board.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <nav>
        <h2 id="title"><a href="{{ url_for('main.main_page') }}">лӘЁл‘җмқҳ нҶ мқө</a></h2>
        <ul id="nav-links-left">
            <li class="{{ 'active' if request.endpoint.endswith('mock_test') }}"><a href="{{ url_for('main.mock_test') }}">лӘЁмқҳкі мӮ¬</a></li>
            <li class="{{ 'active' if request.endpoint.endswith('board_page') }}"><a href="{{ url_for('main.board_page') }}">Q&A кІҢмӢңнҢҗ</a></li>
        </ul>
        <ul id="nav-links-right">
            <li id="nav-user">{{ session['username'] }}</li>
            <li><a href="https://toeic4all.com/user/login" id="nav-login">лЎңк·ёмқё</a></li>
            <!-- <li><a href="https://toeic4all.com/user/signup" id="nav-signup">нҡҢмӣҗк°Җмһ…</a></li> -->
            <li><a href="#" id="nav-logout">лЎңк·ём•„мӣғ</a></li> <!-- лЎңк·ём•„мӣғ л§ҒнҒ¬лҘј "#"лЎң ліҖкІҪн–ҲмҠөлӢҲлӢӨ. -->
        </ul>               
    </nav>
    <nav>
        <div id="hamburger-btn">
            <i class="fas fa-bars"></i> <!-- Font Awesomeмқҳ н–„лІ„кұ° лІ„нҠј м•„мқҙмҪҳ -->
        </div>
        <div id="side-nav" class="hidden"> <!-- мӮ¬мқҙл“ң л„Өл№„кІҢмқҙм…ҳ л°”, мІҳмқҢм—җлҠ” мҲЁкІЁм ё мһҲмқҢ -->
            <h2 id="title"><a href="{{ url_for('main.main_page') }}">лӘЁл‘җмқҳ нҶ мқө</a></h2>
            <ul id="nav-links-left">
                <li class="{{ 'active' if request.endpoint.endswith('mock_test') }}"><a href="{{ url_for('main.mock_test') }}">лӘЁмқҳкі мӮ¬</a></li>
                <li class="{{ 'active' if request.endpoint.endswith('board_page') }}"><a href="{{ url_for('main.board_page') }}">Q&A кІҢмӢңнҢҗ</a></li>
            </ul>
            <ul id="nav-links-right">
                <li id="nav-user">{{ session['username'] }}</li>
                <li><a href="https://toeic4all.com/user/login" id="nav-login">лЎңк·ёмқё</a></li>
                <li><a href="#" id="nav-logout">лЎңк·ём•„мӣғ</a></li> <!-- лЎңк·ём•„мӣғ л§ҒнҒ¬лҘј "#"лЎң ліҖкІҪн–ҲмҠөлӢҲлӢӨ. -->
            </ul>
        </div>
    </nav>
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
