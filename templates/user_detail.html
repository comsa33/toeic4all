{% extends "layout.html" %}

{% block additional_css %}
<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/user_detail.css') }}">
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/user_layout.css') }}">
{% endblock %}

{% block body_top %}
<div id="my-img-container" class="my-img-container">
    <div class="blur-bg-image" data-bg-url="{{ url_for('static', filename='images/notebook-img1.jpg') }}"></div>
    <div class="my-img-text">
        <h1 class="h1-on-img" style="text-align:center; margin-bottom: 2rem;">사용자 정보</h1>
    </div>
</div>
<script>
    // 이미지의 URL을 가져와서 CSS 스타일로 적용합니다.
    var blurBgImage = document.querySelector('.blur-bg-image');
    var bgUrl = blurBgImage.getAttribute('data-bg-url');
    blurBgImage.style.backgroundImage = "url('" + bgUrl + "')";
</script>
{% endblock %}

<div class="row">
    <div class="col-3">
        {% block lnb %}{% endblock %}
    </div>
    <div class="col-9">
        {% block content %}
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <hr>
                    <p>사용자 이름: {{ username }}</p>
                    <p>가입한 날짜: {{ join_date }}</p>
                    <button id="edit-button" class="btn btn-primary">내 추가정보 수정</button>
                    <hr>
                    <form id="edit-form" style="display: block;">
                        <div class="form-group">
                            <label for="email">이메일</label>
                            <input type="email" class="form-control" id="email" placeholder="example@email.com 형식으로 이메일을 입력하세요" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">휴대폰 번호</label>
                            <input type="tel" class="form-control" id="phone" placeholder="000-0000-0000 형식으로 전화번호를 입력하세요" pattern="\d{3}-\d{4}-\d{4}" required>
                        </div>
                        <div class="form-group">
                            <label for="job">직업</label>
                            <select class="form-control" id="job">
                                <option value="" selected>선택하세요</option>
                                <option value="student">학생</option>
                                <option value="employee">직장인</option>
                                <option value="unemployed">실직자</option>
                                <option value="others">기타</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="toeic-experience">토익 시험 경험</label>
                            <select class="form-control" id="toeic-experience">
                                <option value="" selected>선택하세요</option>
                                <option value="true">네</option>
                                <option value="false">아니오</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="toeic-score">현재 토익 점수</label>
                            <input type="number" class="form-control" id="toeic-score" placeholder="2년이내 토익 점수를 입력하세요" disabled>
                        </div>
                        <div class="form-group">
                            <label for="toeic-target-score">토익 목표 점수</label>
                            <input type="number" class="form-control" id="toeic-target-score" placeholder="목표하는 토익 점수를 입력하세요">
                        </div>                
                        <div class="form-group">
                            <label for="toeic-goal">토익 공부 목적</label>
                            <select class="form-control" id="toeic-goal">
                                <option value="" selected>선택하세요</option>
                                <option value="job">직업 관련</option>
                                <option value="study-abroad">유학</option>
                                <option value="self-improvement">자기계발</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success">저장</button>
                    </form>
                </div>
            </div>
        </div>
        {% endblock %}
    </div>
</div>

{% block additional_script %}
    <script src="{{ url_for('static', filename='js/user_detail.js') }}"></script>
{% endblock %}
