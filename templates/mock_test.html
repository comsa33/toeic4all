{% extends "layout.html" %}

{% block content %}
    <h1>AI Mock Test</h1>

    <div class="content">
        <div class="dropdown">
            <select id="difficulty" class="select">
                <option value="">-- 난이도를 선택하세요 --</option>
                <option value="easy">초급</option>
                <option value="mid">중급</option>
                <option value="difficult">고급</option>
            </select>
        </div>

        <button id="generate-btn" class="button">AI 모의고사 생성</button>

        <div id="test-result" style="text-align: center; margin-top: 2rem;"></div>

        <button id="download-question-btn" class="button" style="display: none; margin-top: 1rem;">문제집 다운로드</button>
        <button id="download-answer-btn" class="button" style="display: none; margin-top: 1rem;">정답/해설지 다운로드</button>
    </div>
{% endblock %}
