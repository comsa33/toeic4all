{% extends "layout.html" %}

{% block content %}
    <h2 style="text-align:center; margin-bottom: 2rem;">AI 모의고사</h2>

    <div class="dropdown">
        <select id="difficulty" class="select">
            <option value="">-- 난이도를 선택하세요 --</option>
            <option value="easy">초급</option>
            <option value="mid">중급</option>
            <option value="difficult">고급</option>
        </select>
        <button id="generate-btn" class="button">AI 모의고사 생성</button>
    </div>
    
    <div id="test-links" style="display: none; text-align: center;">
        <h3>AI 모의고사가 생성되었습니다!</h3>
        <div class="button-container">
            <button class="btn btn-link">
                <i class="fas fa-file-alt"></i>
                <a id="questions-link" href="#" target="_blank">문제지 보기</a>
            </button>
            <button class="btn btn-link">
                <i class="fas fa-check-square"></i>
                <a id="answers-link" href="#" target="_blank">정답지 보기</a>
            </button>
            <button class="btn btn-link">
                <i class="fas fa-comment-dots"></i>
                <a id="explanations-link" href="#" target="_blank">해설지 보기</a>
            </button>
        </div>
    </div>    

    <div id="test-result" style="text-align: center;"></div>
{% endblock %}
