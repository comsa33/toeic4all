{% extends "layout.html" %}

{% block content %}
    <div class="content" style="margin: 2rem auto; max-width: 600px;">
        <h2 style="text-align:center; margin-bottom: 2rem;">AI 모의고사</h2>

        <div class="dropdown" style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
            <select id="difficulty" class="select">
                <option value="">-- 난이도를 선택하세요 --</option>
                <option value="easy">초급</option>
                <option value="mid">중급</option>
                <option value="difficult">고급</option>
            </select>
            <button id="generate-btn" class="button">AI 모의고사 생성</button>
        </div>
        
        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-bottom: 2rem;">
            <button id="download-question-btn" class="button" style="display: none;">문제집 다운로드</button>
            <button id="download-answer-btn" class="button" style="display: none;">정답/해설지 다운로드</button>
        </div>
        
        <div id="test-result" style="text-align: center;"></div>
    </div>
{% endblock %}
